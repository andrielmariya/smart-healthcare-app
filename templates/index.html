<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andriel | Health Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #eff6f9;
            --sidebar-color: #ffffff;
            --accent-color: #4834d4;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 80px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #e0e0e0;
        }

        .sidebar-icon {
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-icon.active { color: #2ecc71; }
        .sidebar-icon:hover { color: var(--accent-color); }

        /* Main Content Styling */
        .main-wrapper {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* The Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 20px;
        }

        .health-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: none;
        }

        .symptom-analyzer-box {
            grid-column: 1 / 2;
        }

        textarea.form-control {
            background-color: #f8fafb;
            border: 1px solid #eee;
            border-radius: 12px;
        }

        .btn-primary {
            background-color: #111;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
        }

        .result-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f0fff4;
            display: none;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-icon active"><i class="fas fa-home"></i></div>
        <div class="sidebar-icon"><i class="fas fa-heartbeat"></i></div>
        <div class="sidebar-icon"><i class="fas fa-calendar-alt"></i></div>
        <div class="sidebar-icon"><i class="fas fa-cog"></i></div>
    </nav>

    <div class="main-wrapper">
        <header class="dashboard-header">
            <div>
                <h2 class="fw-bold">Hi, Andriel!</h2>
                <p class="text-muted">Let's look at your health analysis overview.</p>
            </div>
            <div class="d-flex align-items-center">
                <input type="text" class="form-control rounded-pill border-0 px-4 py-2" placeholder="Search metrics..." style="width: 250px;">
                <img src="https://ui-avatars.com/api/?name=Andriel+Mariya&background=random" class="rounded-circle ms-3" width="45" alt="Profile">
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="health-card symptom-analyzer-box">
                <h5 class="fw-bold mb-4">AI Symptom Analyzer</h5>
                <textarea id="symptoms" class="form-control mb-3" rows="5" placeholder="Enter your symptoms here..."></textarea>
                <button id="analyzeBtn" class="btn btn-primary">Start Analysis -></button>
                <div id="resultBox" class="result-container mt-4"></div>
            </div>

            <div class="d-flex flex-column gap-3">
                <div class="health-card" style="background-color: #e3f2fd;">
                    <h6 class="text-primary fw-bold">Hydration Status</h6>
                    <h3 class="fw-bold">2.15L <small class="fs-6 text-muted">/ Day</small></h3>
                    <div class="badge bg-white text-primary rounded-pill mt-2 p-2 px-3">Well Done! 👍</div>
                </div>

                <div class="health-card">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted fw-bold mb-0">Heart Rate</h6>
                        <span class="badge bg-info-subtle text-info rounded-pill">Normal</span>
                    </div>
                    <div style="height: 120px;">
                        <canvas id="heartRateChart"></canvas>
                    </div>
                    <div class="mt-2 text-center">
                        <h4 class="fw-bold mb-0">72 <small class="fs-6 text-muted">BPM</small></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize the Chart
        const ctx = document.getElementById('heartRateChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1pm', '2pm', '3pm', '4pm', '5pm', '6pm'],
                datasets: [{
                    label: 'BPM',
                    data: [65, 78, 72, 85, 70, 72],
                    borderColor: '#ff9f43',
                    backgroundColor: 'rgba(255, 159, 67, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });

        // 2. Symptom Analyzer Logic
        document.getElementById('analyzeBtn').addEventListener('click', async function() {
            const symptomsText = document.getElementById('symptoms').value;
            const resultBox = document.getElementById('resultBox');

            if (!symptomsText.trim()) return alert("Please enter symptoms.");

            resultBox.style.display = 'block';
            resultBox.innerHTML = "<em>Analyzing...</em>";

            try {
                const response = await fetch('/analyze-symptoms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: symptomsText })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultBox.innerHTML = `<span class='text-danger'>${data.error}</span>`;
                    return;
                }

                resultBox.innerHTML = `
                    <h5 class="fw-bold text-success">Analysis: ${data.possible_condition}</h5>
                    <p class="small text-muted mb-0">Confidence: <strong>${data.confidence_level}</strong></p>
                    <hr>
                    <p class="mb-1 small"><strong>Recommendations:</strong> ${data.recommended_actions[0]}</p>
                `;
            } catch (error) {
                resultBox.innerHTML = "Error connecting to AI server.";
            }
        });
    </script>
</body>
</html>
