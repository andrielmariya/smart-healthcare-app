<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andriel | Health Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #eff6f9;
            --sidebar-color: #ffffff;
            --accent-color: #4834d4;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 80px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #e0e0e0;
        }

        .sidebar-icon {
            font-size: 1.4rem;
            color: #bdc3c7;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-icon.active { color: var(--accent-color); }

        .main-wrapper {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-gap: 20px;
        }

        .health-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: none;
        }

        .symptom-analyzer-box { grid-column: 1 / 2; }

        textarea.form-control {
            background-color: #f8fafb;
            border: 1px solid #eee;
            border-radius: 12px;
            resize: none;
        }

        .btn-primary {
            background-color: #111;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
        }

        .result-container {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: #f0fff4;
            display: none;
            border-left: 5px solid #2ecc71;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-icon active"><i class="fas fa-columns"></i></div>
        <div class="sidebar-icon"><i class="fas fa-heartbeat"></i></div>
        <div class="sidebar-icon"><i class="fas fa-user-md"></i></div>
        <div class="sidebar-icon"><i class="fas fa-cog"></i></div>
    </nav>

    <div class="main-wrapper">
        <header class="dashboard-header">
            <div>
                <h2 class="fw-bold mb-0">Hi, Andriel!</h2>
                <p class="text-muted mb-0" id="liveDate" style="font-size: 0.9rem;"></p>
                <p class="fw-bold text-primary mb-0" id="liveClock"></p>
            </div>
            <div class="d-flex align-items-center">
                <input type="text" class="form-control rounded-pill border-0 px-4" placeholder="Search health metrics..." style="width: 250px; height: 45px; background: white;">
                <img src="https://ui-avatars.com/api/?name=Andriel+Mariya&background=4834d4&color=fff" class="rounded-circle ms-3" width="45" alt="Profile">
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="health-card symptom-analyzer-box">
                <h5 class="fw-bold mb-4">🩺 AI Symptom Analyzer</h5>
                <textarea id="symptoms" class="form-control mb-3" rows="6" placeholder="Describe how you are feeling..."></textarea>
                <button id="analyzeBtn" class="btn btn-primary">Start AI Analysis -></button>
                
                <div id="resultBox" class="result-container animate__animated animate__fadeIn"></div>
            </div>

            <div class="d-flex flex-column gap-3">
                <div class="health-card" style="background-color: #e3f2fd;">
                    <h6 class="text-primary fw-bold">Hydration</h6>
                    <h3 class="fw-bold mb-1">2.15L <small class="fs-6 text-muted">/ Day</small></h3>
                    <div class="badge bg-white text-primary rounded-pill p-2 px-3">Goal: 3.0L</div>
                </div>

                <div class="health-card">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted fw-bold mb-0">Heart Rate</h6>
                        <span class="badge bg-success-subtle text-success rounded-pill">Stable</span>
                    </div>
                    <div style="height: 110px;">
                        <canvas id="heartRateChart"></canvas>
                    </div>
                    <div class="mt-2 text-center">
                        <h4 class="fw-bold mb-0">72 <small class="fs-6 text-muted">BPM</small></h4>
                    </div>
                </div>
                <div class="health-card">
                    <h6 class="text-muted fw-bold mb-3">Daily Steps</h6>
                    <div style="height: 150px; position: relative;">
                        <canvas id="stepsChart"></canvas>
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                            <h4 class="fw-bold mb-0">7,432</h4>
                            <small class="text-muted">Steps</small>
                        </div>
                    </div>
                    <div class="mt-3 text-center">
                        <span class="badge bg-success-subtle text-success rounded-pill">74% of Goal</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Live Clock & Date Logic
        function updateClock() {
            const now = new Date();
            const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('liveDate').innerText = now.toLocaleDateString('en-US', dateOpts);
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-US', timeOpts);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Heart Rate Chart Initialization
        const ctx = document.getElementById('heartRateChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['1pm', '2pm', '3pm', '4pm', '5pm', '6pm'],
                datasets: [{
                    data: [68, 75, 71, 82, 69, 72],
                    borderColor: '#4834d4',
                    backgroundColor: 'rgba(72, 52, 212, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });

        // 3. AI Analysis Logic
        document.getElementById('analyzeBtn').addEventListener('click', async function() {
            const symptomsText = document.getElementById('symptoms').value;
            const resultBox = document.getElementById('resultBox');

            if (!symptomsText.trim()) return alert("Please enter symptoms.");

            resultBox.style.display = 'block';
            resultBox.innerHTML = "<div class='text-center py-3'><div class='spinner-border spinner-border-sm text-success'></div><span class='ms-2'>AI is processing...</span></div>";

            try {
                const response = await fetch('/analyze-symptoms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: symptomsText })
                });
                const data = await response.json();
                
                let badge = data.confidence_level === "High" ? "bg-danger" : "bg-warning text-dark";

                resultBox.innerHTML = `
                    <h5 class="fw-bold text-success">Possible Condition: ${data.possible_condition}</h5>
                    <span class="badge ${badge} mb-3">AI Confidence: ${data.confidence_level}</span>
                    <p class="small"><strong>Recommended Actions:</strong> ${data.recommended_actions.join(', ')}</p>
                    <p class="small text-danger mb-0"><strong>Emergency Signs:</strong> ${data.seek_medical_help_if.join(' or ')}</p>
                `;
            } catch (error) {
                resultBox.innerHTML = "<p class='text-danger'>Server Connection Error.</p>";
            }
        });
        // 4. Step Counter (Donut Chart)
const stepCtx = document.getElementById('stepsChart').getContext('2d');
new Chart(stepCtx, {
    type: 'doughnut',
    data: {
        labels: ['Completed', 'Remaining'],
        datasets: [{
            data: [7432, 2568],
            backgroundColor: ['#2ecc71', '#f0f0f0'], // Green for progress, light gray for remaining
            borderWidth: 0,
            cutout: '80%' // This creates the "Ring" look
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
    }
});
    </script>
</body>
</html>
