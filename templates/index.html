<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h2>AI Symptom Analyzer</h2>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="symptoms" class="form-label"><strong>What are your symptoms?</strong></label>
                            <textarea class="form-control" id="symptoms" rows="4" placeholder="e.g., I have a headache, mild fever, and body ache for 2 days..."></textarea>
                        </div>
                        <button class="btn btn-primary w-100" id="analyzeBtn">Analyze Symptoms</button>

                        <hr class="my-4">

                        <h5 class="mb-3">Analysis Result:</h5>
                        <div id="resultBox" class="alert alert-secondary">
                            Awaiting input...
                        </div>

                        <div class="alert alert-warning mt-4 text-center" role="alert">
                            <strong>⚠️ IMPORTANT:</strong> This system provides AI-generated suggestions and is not a substitute for professional medical advice.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async function() {
            const symptomsText = document.getElementById('symptoms').value;
            const resultBox = document.getElementById('resultBox');

            if (!symptomsText.trim()) {
                alert("Please enter some symptoms first!");
                return;
            }

            resultBox.innerHTML = "<em>Analyzing symptoms... Please wait.</em>";

            try {
                const response = await fetch('/analyze-symptoms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: symptomsText })
                });

                const data = await response.json();

                if (data.error) {
                    resultBox.innerHTML = `<span class='text-danger'>${data.error}</span>`;
                    return;
                }

                const actionsHtml = data.recommended_actions.map(action => `<li>${action}</li>`).join('');
                const medicalHelpHtml = data.seek_medical_help_if.map(flag => `<li>${flag}</li>`).join('');

                // --- NEW: Dynamic Badge Color Logic ---
                let badgeClass = "bg-info"; // Default blue
                if (data.confidence_level === "High") {
                    badgeClass = "bg-danger"; // Red
                } else if (data.confidence_level === "Medium") {
                    badgeClass = "bg-warning text-dark"; // Yellow
                } else if (data.confidence_level === "Low") {
                    badgeClass = "bg-success"; // Green
                }

                // Update the UI
                resultBox.innerHTML = `
                    <h4 class="text-primary">${data.possible_condition}</h4>
                    <p><strong>Confidence Level:</strong> <span class="badge ${badgeClass}">${data.confidence_level}</span></p>
                    
                    <strong>Recommended Actions:</strong>
                    <ul>${actionsHtml}</ul>
                    
                    <strong class="text-danger">Seek Medical Help If:</strong>
                    <ul>${medicalHelpHtml}</ul>
                    
                    <hr>
                    <small class="text-muted"><em>${data.disclaimer}</em></small>
                `;
            } catch (error) {
                resultBox.innerHTML = "<span class='text-danger'>Error connecting to the server. Make sure Flask is running!</span>";
                console.error("Error:", error);
            }
        });
    </script>
</body>
</html>
