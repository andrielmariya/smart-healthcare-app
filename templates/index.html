<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Companion | Andriel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
        }
        .main-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header-section {
            background: #4834d4;
            color: white;
            padding: 2.5rem 1rem;
            text-align: center;
        }
        .btn-analyze {
            background: #4834d4;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-analyze:hover {
            background: #686de0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 52, 212, 0.3);
        }
        .result-container {
            border-left: 5px solid #4834d4;
            background: #f8f9ff;
            border-radius: 0 12px 12px 0;
            display: none;
        }
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4834d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card main-card animate__animated animate__fadeInUp">
                <div class="header-section">
                    <h2 class="fw-bold mb-0">🩺 AI Health Companion</h2>
                    <p class="small opacity-75 mb-0">Smart Symptom Analysis Powered by Llama 3.1</p>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Describe your symptoms:</label>
                        <textarea id="symptoms" class="form-control" rows="4" placeholder="e.g. I have a sharp headache and feel slightly nauseous..."></textarea>
                    </div>
                    
                    <button id="analyzeBtn" class="btn btn-primary w-100 btn-analyze mb-4">Analyze Symptoms</button>
                    
                    <div id="loading" class="text-center mb-4">
                        <div class="loader mx-auto"></div>
                        <p class="text-muted small mt-2">AI is analyzing your symptoms...</p>
                    </div>

                    <div id="resultBox" class="result-container p-4 animate__animated animate__fadeIn">
                        </div>

                    <div class="mt-4 p-3 bg-light rounded border">
                        <small class="text-muted d-block text-center" style="font-size: 0.75rem;">
                            ⚠️ <strong>Disclaimer:</strong> This system provides AI-generated suggestions and is not a substitute for professional medical advice.
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('analyzeBtn').addEventListener('click', async function() {
        const symptomsText = document.getElementById('symptoms').value;
        const resultBox = document.getElementById('resultBox');
        const loader = document.getElementById('loading');

        if (!symptomsText.trim()) return alert("Please enter your symptoms.");

        resultBox.style.display = 'none';
        loader.style.display = 'block';

        try {
            const response = await fetch('/analyze-symptoms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symptoms: symptomsText })
            });

            const data = await response.json();
            loader.style.display = 'none';

            if (data.error) {
                resultBox.style.display = 'block';
                resultBox.innerHTML = `<span class='text-danger'>${data.error}</span>`;
                return;
            }

            let badge = data.confidence_level === "High" ? "bg-danger" : (data.confidence_level === "Medium" ? "bg-warning text-dark" : "bg-success");

            resultBox.style.display = 'block';
            resultBox.innerHTML = `
                <h4 class="fw-bold" style="color: #4834d4;">${data.possible_condition}</h4>
                <span class="badge ${badge} mb-3">Confidence: ${data.confidence_level}</span>
                
                <p class="fw-bold mb-1 text-dark">Suggested Actions:</p>
                <ul class="ps-3 small">${data.recommended_actions.map(a => `<li>${a}</li>`).join('')}</ul>
                
                <p class="fw-bold mb-1 text-danger">Seek Help If:</p>
                <ul class="ps-3 small">${data.seek_medical_help_if.map(f => `<li>${f}</li>`).join('')}</ul>
            `;
        } catch (error) {
            loader.style.display = 'none';
            alert("Connection error. Is the server live?");
        }
    });
</script>

</body>
</html>
